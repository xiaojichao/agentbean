<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>AgentBean</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
        background: #f7f7f6;
        color: #171717;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
      }
      .sr-only {
        border: 0;
        clip: rect(0, 0, 0, 0);
        height: 1px;
        margin: -1px;
        overflow: hidden;
        padding: 0;
        position: absolute;
        white-space: nowrap;
        width: 1px;
      }
      button,
      input,
      textarea,
      select {
        font: inherit;
      }
      button {
        cursor: pointer;
      }
      main {
        display: grid;
        grid-template-columns: 208px minmax(0, 1fr) 348px;
        height: 100vh;
        min-height: 100vh;
        overflow: hidden;
      }
      aside,
      section {
        min-width: 0;
      }
      h1,
      h2,
      h3,
      p {
        margin: 0;
        letter-spacing: 0;
      }
      h1 {
        font-size: 14px;
        font-weight: 650;
      }
      h2 {
        font-size: 14px;
        font-weight: 650;
      }
      h3 {
        font-size: 12px;
        font-weight: 650;
      }
      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid #d7d7d3;
        border-radius: 6px;
        padding: 8px 10px;
        color: #171717;
        background: #ffffff;
        outline: none;
      }
      input:focus,
      textarea:focus,
      select:focus {
        border-color: #171717;
      }
      textarea {
        line-height: 1.5;
        min-height: 76px;
        resize: vertical;
      }
      label {
        display: grid;
        gap: 5px;
        font-size: 12px;
        color: #666b70;
      }
      button {
        align-items: center;
        border: 0;
        border-radius: 6px;
        background: #171717;
        color: #ffffff;
        display: inline-flex;
        font-weight: 600;
        justify-content: center;
        min-height: 34px;
        padding: 8px 12px;
      }
      button.secondary {
        background: #ffffff;
        border: 1px solid #d7d7d3;
        color: #2f3437;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }
      .brand {
        align-items: center;
        border-bottom: 1px solid #e5e5e5;
        display: flex;
        gap: 9px;
        min-height: 56px;
        padding: 0 14px 0 16px;
        position: relative;
      }
      .brand-mark {
        align-items: center;
        background: #171717;
        border-radius: 6px;
        color: #ffffff;
        display: inline-flex;
        font-size: 13px;
        font-weight: 700;
        height: 28px;
        justify-content: center;
        width: 28px;
      }
      .brand-copy {
        min-width: 0;
      }
      .brand-subtitle {
        color: #737373;
        font-size: 11px;
        margin-top: 1px;
      }
      .team-strip {
        border-bottom: 1px solid #e5e5e5;
        display: grid;
        gap: 8px;
        padding: 10px 12px;
      }
      .team-form {
        display: grid;
        gap: 8px;
      }
      .team-row {
        align-items: center;
        display: flex;
        gap: 8px;
      }
      .team-row button {
        flex: 0 0 auto;
        min-width: 44px;
      }
      .team-form label {
        margin: 0;
        min-width: 0;
        flex: 1;
      }
      .team-switcher {
        align-items: center;
        background: #ffffff;
        border: 1px solid #d7d7d3;
        color: #171717;
        display: flex;
        gap: 8px;
        justify-content: space-between;
        min-height: 32px;
        width: 100%;
      }
      .team-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .team-caret {
        color: #737373;
        flex: 0 0 auto;
      }
      .team-advanced {
        display: grid;
        gap: 8px;
      }
      body[data-auth="true"] .team-advanced {
        display: none;
      }
      .session-summary {
        color: #737373;
        display: none;
        font-size: 12px;
        overflow-wrap: anywhere;
      }
      body[data-auth="true"] .session-summary {
        display: block;
      }
      .connection-pill {
        align-items: center;
        border: 1px solid #bbf7d0;
        background: #f0fdf4;
        border-radius: 999px;
        color: #047857;
        display: inline-flex;
        font-size: 11px;
        font-weight: 650;
        margin-left: auto;
        min-height: 24px;
        padding: 2px 8px;
        white-space: nowrap;
      }
      .sidebar-scroll {
        display: grid;
        align-content: start;
        gap: 14px;
        overflow: auto;
        padding: 12px 8px 16px;
      }
      .nav-group {
        display: grid;
        gap: 3px;
      }
      .nav-item,
      .nav-row {
        align-items: center;
        border-radius: 6px;
        display: flex;
        font-size: 14px;
        font-weight: 550;
        gap: 8px;
        min-height: 32px;
        padding: 6px 8px;
      }
      .nav-item.active,
      .nav-row.active {
        background: #e8e8e6;
        color: #111827;
        font-weight: 650;
      }
      .nav-item.muted {
        color: #70757a;
      }
      .nav-row {
        background: transparent;
        border: 0;
        color: #3f4549;
        width: 100%;
      }
      .nav-row:hover {
        background: #f0f0ee;
      }
      .section-title {
        color: #737373;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        margin: 0 6px 5px;
        text-transform: uppercase;
      }
      .list {
        display: grid;
        gap: 6px;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .item {
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 9px 10px;
        background: #ffffff;
        display: grid;
        gap: 4px;
      }
      .item.compact {
        border: 0;
        border-radius: 6px;
        background: transparent;
        padding: 4px 6px;
      }
      .meta {
        color: #68747b;
        font-size: 12px;
        overflow-wrap: anywhere;
      }
      .primary {
        overflow-wrap: anywhere;
      }
      .workspace {
        background: #fafafa;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .conversation-header {
        align-items: center;
        background: #ffffff;
        border-bottom: 1px solid #e5e5e5;
        display: flex;
        justify-content: space-between;
        min-height: 56px;
        padding: 0 16px;
      }
      .channel-badge {
        align-items: center;
        background: #f5f5f4;
        border: 1px solid #e7e5e4;
        border-radius: 6px;
        color: #525252;
        display: inline-flex;
        font-weight: 700;
        height: 32px;
        justify-content: center;
        width: 32px;
      }
      .title-row {
        align-items: center;
        display: flex;
        gap: 10px;
        min-width: 0;
      }
      .header-actions {
        align-items: center;
        display: flex;
        gap: 8px;
      }
      .conversation {
        flex: 1;
        overflow: auto;
        padding: 18px 16px;
      }
      .conversation-inner {
        display: grid;
        align-content: start;
        gap: 10px;
        min-height: 100%;
        margin: 0 auto;
        max-width: 768px;
      }
      .empty-state {
        align-items: center;
        color: #a3a3a3;
        display: flex;
        font-size: 14px;
        justify-content: center;
        min-height: 100%;
      }
      .message {
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        display: grid;
        gap: 6px;
        padding: 11px 12px;
      }
      .message.human {
        background: #eff6ff;
        border-color: #dbeafe;
        color: #1e3a8a;
      }
      .message.agent {
        background: #ffffff;
      }
      .message.system {
        background: #fffbeb;
        border-color: #fde68a;
        color: #92400e;
        justify-self: center;
        max-width: 560px;
        text-align: center;
      }
      .message-head {
        align-items: center;
        color: #737373;
        display: flex;
        font-size: 12px;
        justify-content: space-between;
      }
      .message-speaker {
        font-weight: 700;
      }
      .message-body {
        font-size: 14px;
        line-height: 1.5;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }
      .message-artifacts {
        border-top: 1px solid #ececea;
        display: grid;
        gap: 6px;
        padding-top: 6px;
      }
      .message-artifacts ul {
        display: grid;
        gap: 5px;
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .message-artifact-group {
        display: grid;
        gap: 5px;
      }
      .message-artifact-group-title {
        color: #525252;
        font-size: 11px;
        font-weight: 700;
      }
      .message-artifact-folder {
        color: #737373;
        font-size: 11px;
        font-weight: 650;
      }
      .message-artifact {
        align-items: center;
        background: #f7f7f6;
        border: 1px solid #e7e5e4;
        border-radius: 6px;
        display: flex;
        gap: 8px;
        min-height: 30px;
        padding: 5px 7px;
      }
      .message-artifact-name {
        flex: 1;
        font-size: 12px;
        font-weight: 650;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .message-artifact a {
        color: #2563eb;
        font-size: 12px;
        font-weight: 650;
        text-decoration: none;
        white-space: nowrap;
      }
      .message-artifact-run {
        color: #737373;
        font-size: 12px;
      }
      .message-run-details {
        display: flex;
        flex-wrap: wrap;
        gap: 4px 10px;
        margin: 0;
      }
      .message-run-details div {
        align-items: baseline;
        display: flex;
        gap: 4px;
        min-width: 0;
      }
      .message-run-details dt {
        color: #737373;
        font-size: 11px;
        font-weight: 650;
        margin: 0;
      }
      .message-run-details dd {
        color: #262626;
        font-size: 12px;
        margin: 0;
        max-width: 260px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .composer {
        background: #ffffff;
        border-top: 1px solid #e5e5e5;
        padding: 12px 16px 14px;
      }
      .composer form {
        border: 0;
        display: grid;
        gap: 8px;
        margin: 0 auto;
        max-width: 768px;
        padding: 0;
      }
      .composer textarea {
        background: #ffffff;
      }
      .composer-actions {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }
      .composer-actions label {
        margin: 0;
        max-width: 240px;
        width: 40%;
      }
      .composer-upload {
        align-items: center;
        color: #737373;
        display: flex;
        flex-wrap: wrap;
        font-size: 12px;
        gap: 8px;
      }
      .composer-upload input {
        max-width: 100%;
      }
      .sidebar-action,
      .workbench-card {
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: #ffffff;
        padding: 10px;
      }
      .sidebar-action {
        display: grid;
        gap: 8px;
      }
      .action-heading {
        align-items: center;
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      .action-heading h2 {
        font-size: 13px;
      }
      .form-grid {
        display: grid;
        gap: 8px;
      }
      .right-rail {
        background: #fafafa;
        border-left: 1px solid #e5e5e5;
        display: grid;
        gap: 12px;
        align-content: start;
        overflow: auto;
        padding: 14px 14px 18px;
      }
      .rail-heading {
        align-items: center;
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .rail-tabs {
        background: #efefed;
        border-radius: 8px;
        display: grid;
        gap: 2px;
        grid-template-columns: repeat(3, 1fr);
        padding: 2px;
      }
      .rail-tab {
        background: transparent;
        color: #525252;
        font-size: 12px;
        min-height: 28px;
        padding: 4px 6px;
      }
      .rail-tab.active {
        background: #ffffff;
        color: #171717;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.06);
      }
      .panel {
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: #ffffff;
        padding: 10px;
      }
      .events {
        max-height: 168px;
        overflow: auto;
      }
      .compact-form {
        display: grid;
        gap: 8px;
      }
      .compact-form label {
        margin: 0;
      }
      .inline-form-row {
        display: grid;
        gap: 8px;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }
      .advanced-fields {
        border-top: 1px solid #eeeeec;
        padding-top: 8px;
      }
      .advanced-fields summary {
        color: #666b70;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .rail-muted {
        color: #737373;
        font-size: 12px;
      }
      @media (max-width: 860px) {
        main {
          height: auto;
          overflow: visible;
          grid-template-columns: 1fr;
        }
        aside {
          border-right: 0;
          border-bottom: 1px solid #d7dad4;
          min-height: auto;
        }
        .right-rail {
          border-left: 0;
          border-top: 1px solid #e5e5e5;
        }
        .composer-actions {
          align-items: stretch;
          display: grid;
          gap: 8px;
        }
        .composer-actions label {
          max-width: none;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <div class="brand">
          <div class="brand-mark">Ab</div>
          <div class="brand-copy">
            <h1>AgentBean</h1>
            <p class="brand-subtitle">私有 Agent 团队</p>
          </div>
          <p class="connection-pill" id="connection-status">连接中</p>
        </div>

        <div class="team-strip">
          <form class="team-form" id="auth-form">
            <div class="team-row">
              <label class="sr-only">当前团队 <input name="teamName" value="AgentBean" /></label>
              <button class="team-switcher" id="team-submit" type="submit" title="进入 AgentBean">
                <span class="team-name" id="team-display-name">AgentBean</span>
                <span class="team-caret">⌄</span>
              </button>
            </div>
            <p class="session-summary" id="session-summary"></p>
            <div class="team-advanced">
              <label>用户名 <input name="username" value="shaw" autocomplete="username" /></label>
              <label>密码 <input name="password" value="secret" type="password" autocomplete="new-password" /></label>
            </div>
          </form>
        </div>

        <div class="sidebar-scroll">
          <div class="nav-group" aria-label="主导航">
            <div class="nav-item active"># 聊天</div>
            <div class="nav-item muted">▣ 任务</div>
            <div class="nav-item muted">◎ 成员</div>
            <div class="nav-item muted">▱ 设备</div>
          </div>
          <section aria-label="频道">
            <div class="section-title">频道</div>
            <ul class="list" id="channels"></ul>
          </section>
          <form class="sidebar-action" id="channel-create-form">
            <div class="action-heading">
              <h2>新建频道</h2>
              <span class="meta">Team</span>
            </div>
            <div class="form-grid">
              <label>名称 <input name="name" value="ops" /></label>
              <label>标题 <input name="title" value="Ops" /></label>
              <label>可见性
                <select name="visibility">
                  <option value="public">公开</option>
                  <option value="private">私有</option>
                </select>
              </label>
            </div>
            <button type="submit">创建频道</button>
          </form>
        </div>
      </aside>

      <section class="workspace">
        <div class="conversation-header">
          <div class="title-row">
            <div class="channel-badge">#</div>
            <div>
              <h2 id="active-channel-title">频道</h2>
              <div class="meta" id="active-channel-meta">公开频道</div>
            </div>
          </div>
          <div class="header-actions">
            <button class="secondary" type="button" disabled>成员</button>
            <button class="secondary" type="button" disabled>设置</button>
          </div>
        </div>
        <div class="conversation">
          <div class="conversation-inner" id="messages"></div>
        </div>
        <div class="composer">
          <form id="message-form">
            <label>内容 <textarea name="body">@Codex hello</textarea></label>
            <label class="composer-upload">附件 <input id="message-artifact-files" name="artifacts" type="file" multiple />随消息上传</label>
            <div class="composer-actions">
              <label>频道 <select name="channelId"></select></label>
              <button type="submit">发送消息</button>
            </div>
          </form>
        </div>
      </section>

      <section class="right-rail">
        <div class="rail-tabs" aria-label="右侧工作区">
          <button class="rail-tab active" type="button">成员</button>
          <button class="rail-tab" type="button">设备</button>
          <button class="rail-tab" type="button">Agent</button>
        </div>
        <div class="panel">
          <div class="rail-heading"><h2>成员</h2><span class="meta">human / agent</span></div>
          <ul class="list" id="agents"></ul>
        </div>
        <div class="panel">
          <div class="rail-heading"><h2>设备</h2><span class="meta">daemon</span></div>
          <ul class="list" id="devices"></ul>
        </div>
        <div class="panel">
          <div class="rail-heading"><h2>运行时</h2><span class="meta">Codex / Claude / Gemini</span></div>
          <ul class="list" id="runtimes"></ul>
        </div>
        <form class="workbench-card compact-form" id="agent-create-form">
          <div class="action-heading">
            <h2>添加自定义 Agent</h2>
            <span class="meta">本机运行时</span>
          </div>
          <div class="inline-form-row">
            <label>设备 <select name="deviceId"></select></label>
            <label>运行时 <select name="runtimeId"></select></label>
          </div>
          <label>名称 <input name="name" value="Codex" /></label>
          <details class="advanced-fields">
            <summary>环境变量</summary>
            <div class="inline-form-row">
              <label>Key <input name="envKey" value="OPENAI_API_KEY" /></label>
              <label>Value <input name="envValue" type="password" /></label>
            </div>
          </details>
          <button type="submit">创建 Agent</button>
        </form>
        <div class="panel events">
          <div class="rail-heading"><h2>活动</h2><span class="meta">socket</span></div>
          <ul class="list" id="events"></ul>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const SESSION_KEY = "agentbean-next-preview-session";
      const socket = io("/web", { transports: ["websocket", "polling"] });
      const state = {
        token: null,
        user: null,
        team: null,
        channel: null,
        channels: [],
        devices: [],
        runtimesByDevice: {},
        selectedDeviceId: null,
        agents: [],
        messages: [],
      };
      const el = (id) => document.getElementById(id);

      socket.on("connect", async () => {
        setStatus("已连接");
        if (state.user && state.team) {
          await subscribe();
          return;
        }
        const restored = await restoreSession();
        if (!restored) {
          await authenticateFromForm();
        }
      });
      socket.on("disconnect", () => setStatus("已断开"));
      socket.on("devices:snapshot", (devices) => {
        state.devices = devices || [];
        const visibleDevices = getVisibleDevices();
        if (!state.selectedDeviceId || !visibleDevices.some((device) => device.id === state.selectedDeviceId)) {
          state.selectedDeviceId = visibleDevices[0]?.id || null;
        }
        render();
      });
      socket.on("device:runtimes", (payload) => {
        if (payload?.deviceId) {
          state.runtimesByDevice[payload.deviceId] = payload.runtimes || [];
          if (!state.selectedDeviceId || getSelectedDeviceRuntimes().length === 0) {
            state.selectedDeviceId = payload.deviceId;
          }
        }
        render();
      });
      socket.on("agents:snapshot", (agents) => {
        state.agents = agents;
        render();
      });
      socket.on("channels:snapshot", (channels) => {
        state.channels = channels || [];
        state.channel = state.channels.find((channel) => channel.id === state.channel?.id) || state.channels[0] || state.channel;
        saveSession();
        render();
      });
      socket.on("channel:message", (message) => {
        state.messages.push(message);
        render();
      });

      el("auth-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        await authenticateFromForm();
      });

      async function authenticateFromForm() {
        const data = Object.fromEntries(new FormData(el("auth-form")));
        let ack = await emit("auth:register", data);
        if (!ack.ok && ack.error === "CONFLICT") {
          ack = await emit("auth:login", {
            username: data.username,
            password: data.password,
          });
        }
        if (!ack.ok) return;
        state.token = ack.token || null;
        state.user = ack.user;
        state.team = ack.currentTeam;
        state.channel = ack.defaultChannel || state.channel;
        saveSession();
        await subscribe();
        render();
      }

      el("channel-create-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!state.user || !state.team) return;
        const data = Object.fromEntries(new FormData(event.currentTarget));
        const ack = await emit("channel:create", {
          userId: state.user.id,
          teamId: state.team.id,
          name: data.name,
          title: data.title || undefined,
          visibility: data.visibility,
        });
        if (ack.ok && ack.channel) {
          state.channel = ack.channel;
          state.channels = [...state.channels.filter((channel) => channel.id !== ack.channel.id), ack.channel];
          saveSession();
          render();
        }
      });

      el("agent-create-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!state.user || !state.team) return;
        const data = Object.fromEntries(new FormData(event.currentTarget));
        const env = data.envKey && data.envValue ? { [data.envKey]: data.envValue } : undefined;
        await emit("agent:create", {
          userId: state.user.id,
          teamId: state.team.id,
          deviceId: data.deviceId,
          runtimeId: data.runtimeId || undefined,
          name: data.name,
          env,
        });
      });
      document.querySelector('#agent-create-form [name="deviceId"]').addEventListener("change", (event) => {
        state.selectedDeviceId = event.currentTarget.value || null;
        render();
      });
      el("channels").addEventListener("click", (event) => {
        const row = event.target.closest("[data-channel-id]");
        if (!row) return;
        const channel = state.channels.find((item) => item.id === row.dataset.channelId);
        if (!channel) return;
        state.channel = channel;
        saveSession();
        render();
      });
      el("devices").addEventListener("click", (event) => {
        const row = event.target.closest("[data-device-id]");
        if (!row) return;
        state.selectedDeviceId = row.dataset.deviceId || null;
        render();
      });

      el("message-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!state.user || !state.team || !state.channel) return;
        const data = Object.fromEntries(new FormData(event.currentTarget));
        const channelId = data.channelId || state.channel.id;
        const uploadedArtifacts = await uploadSelectedArtifacts(channelId);
        if (!uploadedArtifacts) return;
        const ack = await emit("message:send", {
          userId: state.user.id,
          teamId: state.team.id,
          channelId,
          body: data.body,
          ...(uploadedArtifacts.length > 0 ? { artifactIds: uploadedArtifacts.map((artifact) => artifact.id) } : {}),
        });
        if (ack.ok && ack.message) {
          state.messages.push(ack.message);
          el("message-artifact-files").value = "";
          render();
        }
      });

      async function uploadSelectedArtifacts(channelId) {
        const input = el("message-artifact-files");
        const files = Array.from(input?.files || []);
        const artifacts = [];
        for (const file of files) {
          const body = new FormData();
          body.append("token", state.token);
          body.append("channelId", channelId);
          body.append("file", file);
          const response = await fetch(`/api/teams/${encodeURIComponent(state.team.id)}/artifacts/upload`, {
            method: "POST",
            body,
          });
          const ack = await response.json();
          addEvent("artifact:upload", ack);
          if (!ack.ok) return null;
          artifacts.push(ack.artifact);
        }
        return artifacts;
      }

      async function subscribe() {
        const payload = { userId: state.user.id, teamId: state.team.id };
        const devices = await emit("device:list", payload);
        const agents = await emit("agents:subscribe", payload);
        const channels = await emit("channels:subscribe", payload);
        if (!devices.ok || !agents.ok || !channels.ok) {
          clearSession();
        }
      }

      async function emit(event, payload) {
        const ack = await socket.emitWithAck(event, payload);
        addEvent(event, ack);
        return ack;
      }

      function render() {
        const visibleDevices = getVisibleDevices();
        const selectedRuntimes = getSelectedDeviceRuntimes();
        renderChannels();
        renderDevices(visibleDevices);
        renderRuntimes(selectedRuntimes);
        renderAgents();
        renderMessages();
        renderActiveChannel();
        renderAuthState();
        fillSelect("agent-create-form", "deviceId", visibleDevices, (device) => [device.id, device.name || device.id]);
        fillSelect("agent-create-form", "runtimeId", selectedRuntimes, (runtime) => [runtime.id, runtime.name]);
        fillSelect("message-form", "channelId", state.channels, (channel) => [channel.id, channel.title || channel.name]);
      }

      function renderChannels() {
        if (state.channels.length === 0) {
          el("channels").innerHTML = `<li class="item compact"><span class="meta">登录后显示频道</span></li>`;
          return;
        }
        const activeId = state.channel?.id || state.channels[0]?.id;
        el("channels").innerHTML = state.channels.map((channel) => {
          const active = channel.id === activeId ? " active" : "";
          const icon = channel.visibility === "private" ? "▣" : "#";
          return `<li><button class="nav-row${active}" type="button" data-channel-id="${escapeHtml(channel.id)}">
            <span>${icon}</span><span class="primary">${escapeHtml(channel.title || channel.name)}</span>
          </button></li>`;
        }).join("");
      }

      function renderDevices(devices) {
        if (devices.length === 0) {
          el("devices").innerHTML = `<li class="item"><span class="primary">暂无设备</span><span class="meta">daemon 连接后会显示在这里</span></li>`;
          return;
        }
        const selectedId = getSelectedDeviceId();
        el("devices").innerHTML = devices.map((device) => {
          const active = device.id === selectedId ? " active" : "";
          const status = device.status === "online" ? "在线" : device.status || "未知";
          return `<li><button class="nav-row${active}" type="button" data-device-id="${escapeHtml(device.id)}">
            <span>▱</span><span class="primary">${escapeHtml(device.name || device.id)}</span><span class="meta">${escapeHtml(status)}</span>
          </button></li>`;
        }).join("");
      }

      function renderRuntimes(runtimes) {
        renderList("runtimes", runtimes, (runtime) => renderItem(runtime.name, runtime.command || "未安装"));
      }

      function renderAgents() {
        if (state.agents.length === 0) {
          el("agents").innerHTML = `<li class="item"><span class="primary">暂无 Agent</span><span class="meta">创建后会加入当前团队</span></li>`;
          return;
        }
        renderList("agents", state.agents, (agent) => {
          const status = agent.status === "online" ? "在线" : agent.status === "busy" ? "忙碌" : "离线";
          return renderItem(agent.name, `${status} · ${agent.source || "custom"}`);
        });
      }

      function renderList(id, items, format) {
        el(id).innerHTML = items.map((item) => `<li class="item">${format(item)}</li>`).join("");
      }

      function renderItem(primary, meta) {
        return `<span class="primary">${escapeHtml(primary)}</span><span class="meta">${escapeHtml(meta)}</span>`;
      }

      function renderMessages() {
        if (state.messages.length === 0) {
          el("messages").innerHTML = `<div class="empty-state">这个频道还没有消息。</div>`;
          return;
        }
        el("messages").innerHTML = state.messages.map((message) => {
          const kind = message.senderKind || "system";
          const speaker = kind === "human" ? "你" : kind === "agent" ? "Agent" : "系统";
          const time = message.createdAt ? new Date(message.createdAt).toLocaleTimeString("zh-CN") : "";
          const artifacts = renderMessageArtifacts(message);
          return `<article class="message ${escapeHtml(kind)}">
            <div class="message-head"><span class="message-speaker">${speaker}</span><span>${escapeHtml(time)}</span></div>
            <div class="message-body">${escapeHtml(message.body)}</div>
            ${artifacts}
          </article>`;
        }).join("");
        el("messages").parentElement.scrollTop = el("messages").parentElement.scrollHeight;
      }

      function renderMessageArtifacts(message) {
        const artifacts = Array.isArray(message.artifacts) ? message.artifacts : [];
        const workspaceRun = message.workspaceRun;
        if (artifacts.length === 0 && !workspaceRun) return "";
        const run = workspaceRun ? renderWorkspaceRunDetail(workspaceRun) : "";
        const files = renderArtifactGroups(artifacts, workspaceRun);
        return `<div class="message-artifacts">${run}${files}</div>`;
      }

      function renderArtifactGroups(artifacts, workspaceRun) {
        const runArtifactIds = new Set(Array.isArray(workspaceRun?.artifactIds) ? workspaceRun.artifactIds : []);
        const groups = [
          {
            title: "Workspace 输出",
            kind: "workspace",
            artifacts: artifacts.filter((artifact) =>
              artifact.workspaceRunId === workspaceRun?.id || runArtifactIds.has(artifact.id) || artifact.pathKind === "workspace",
            ),
          },
          {
            title: "消息附件",
            kind: "attachment",
            artifacts: artifacts.filter((artifact) =>
              artifact.workspaceRunId !== workspaceRun?.id && !runArtifactIds.has(artifact.id) && artifact.pathKind !== "workspace",
            ),
          },
        ].filter((group) => group.artifacts.length > 0);
        if (groups.length === 0) return "";
        return groups.map((group) => `<div class="message-artifact-group">
          <div class="message-artifact-group-title">${escapeHtml(group.title)}</div>
          ${group.kind === "workspace" ? renderWorkspaceArtifactTree(group.artifacts) : `<ul>${group.artifacts.map(renderArtifactListItem).join("")}</ul>`}
        </div>`).join("");
      }

      function renderWorkspaceArtifactTree(artifacts) {
        const groups = new Map();
        for (const artifact of artifacts) {
          const folder = artifactFolder(artifact.relativePath || artifact.filename || artifact.id);
          groups.set(folder, [...(groups.get(folder) || []), artifact]);
        }
        return Array.from(groups.entries()).map(([folder, files]) => `
          <div class="message-artifact-folder">${escapeHtml(folder)}</div>
          <ul>${files.map(renderArtifactListItem).join("")}</ul>
        `).join("");
      }

      function artifactFolder(path) {
        const normalized = String(path || "").replace(/\\/g, "/").replace(/^\/+/, "");
        const index = normalized.lastIndexOf("/");
        return index > 0 ? `${normalized.slice(0, index)}/` : "./";
      }

      function renderArtifactListItem(artifact) {
        const previewUrl = artifact.previewUrl || artifactUrl(artifact, "preview");
        const downloadUrl = artifact.downloadUrl || artifactUrl(artifact, "download");
        return `<li class="message-artifact">
          <span class="message-artifact-name">${escapeHtml(artifact.filename || artifact.id)}</span>
          <span class="meta">${formatBytes(artifact.sizeBytes || 0)}</span>
          <a href="${escapeHtml(previewUrl)}" target="_blank" rel="noreferrer">预览</a>
          <a href="${escapeHtml(downloadUrl)}" download>下载</a>
        </li>`;
      }

      function renderWorkspaceRunDetail(workspaceRun) {
        const artifactCount = Array.isArray(workspaceRun.artifactIds) ? workspaceRun.artifactIds.length : undefined;
        const details = [
          workspaceRun.cwd ? ["cwd", workspaceRun.cwd] : null,
          workspaceRun.deviceId ? ["device", workspaceRun.deviceId] : null,
          typeof workspaceRun.exitCode === "number" ? ["exit", `exit ${workspaceRun.exitCode}`] : null,
          formatDuration(workspaceRun.startedAt, workspaceRun.completedAt),
          typeof artifactCount === "number" ? ["artifacts", `${artifactCount} artifact${artifactCount === 1 ? "" : "s"}`] : null,
        ].filter(Boolean);
        const detailMarkup = details.length > 0
          ? `<dl class="message-run-details">${details.map(([label, value]) => `<div><dt>${escapeHtml(label)}</dt><dd>${escapeHtml(value)}</dd></div>`).join("")}</dl>`
          : "";
        return `<div>
          <div class="message-artifact-run">Workspace run ${escapeHtml(workspaceRun.id)} · ${escapeHtml(workspaceRun.status || "unknown")}</div>
          ${detailMarkup}
        </div>`;
      }

      function formatDuration(startedAt, completedAt) {
        if (typeof startedAt !== "number" || typeof completedAt !== "number" || completedAt < startedAt) {
          return null;
        }
        const seconds = (completedAt - startedAt) / 1000;
        const value = seconds < 10 ? Number(seconds.toFixed(1)) : Math.round(seconds);
        return ["duration", `${value}s`];
      }

      function artifactUrl(artifact, mode) {
        const teamId = artifact.teamId || state.team?.id;
        const session = state.token ? { token: state.token } : readSession();
        const token = session?.token ? `?token=${encodeURIComponent(session.token)}` : "";
        return `/api/teams/${encodeURIComponent(teamId)}/artifacts/${encodeURIComponent(artifact.id)}/${mode}${token}`;
      }

      function formatBytes(value) {
        const bytes = Number(value) || 0;
        if (bytes < 1024) return `${bytes} B`;
        return `${Math.round(bytes / 1024)} KB`;
      }

      function renderActiveChannel() {
        const active = state.channels.find((channel) => channel.id === state.channel?.id) || state.channel || state.channels[0];
        el("active-channel-title").textContent = active?.title || active?.name || "频道";
        el("active-channel-meta").textContent = active?.visibility === "private" ? "私有频道" : "公开频道";
      }

      function renderAuthState() {
        const authenticated = Boolean(state.user && state.team);
        document.body.dataset.auth = authenticated ? "true" : "false";
        el("team-display-name").textContent = state.team?.name || "AgentBean";
        el("session-summary").textContent = authenticated
          ? `${state.user.username || state.user.name || state.user.id} · ${state.team.name || state.team.id}`
          : "";
      }

      function getSelectedDeviceRuntimes() {
        const selectedId = getSelectedDeviceId();
        return sortRuntimesForPreview(selectedId ? state.runtimesByDevice[selectedId] || [] : []);
      }

      function getSelectedDeviceId() {
        const visibleDevices = getVisibleDevices();
        if (state.selectedDeviceId && visibleDevices.some((device) => device.id === state.selectedDeviceId)) {
          return state.selectedDeviceId;
        }
        return visibleDevices[0]?.id || null;
      }

      function getVisibleDevices() {
        const byStableKey = new Map();
        for (const device of state.devices) {
          const key = device.machineId || (device.profileId && device.name ? `${device.profileId}:${device.name}` : device.name || device.id);
          const previous = byStableKey.get(key);
          if (!previous || devicePreviewScore(device) > devicePreviewScore(previous)) {
            byStableKey.set(key, device);
          }
        }
        return Array.from(byStableKey.values());
      }

      function devicePreviewScore(device) {
        const runtimes = state.runtimesByDevice[device.id] || [];
        return (device.status === "online" ? 1000 : 0) + runtimes.length * 10 + Number(device.lastSeenAt || 0) / 10000000000000;
      }

      function sortRuntimesForPreview(runtimes) {
        const order = new Map([
          ["codex", 0],
          ["codex-cli", 0],
          ["claude-code", 1],
          ["claude", 1],
          ["gemini", 2],
          ["gemini-cli", 2],
        ]);
        return [...runtimes].sort((left, right) => {
          const leftRank = order.get(left.adapterKind) ?? 99;
          const rightRank = order.get(right.adapterKind) ?? 99;
          return leftRank - rightRank || String(left.name).localeCompare(String(right.name));
        });
      }

      function fillSelect(formId, name, items, mapItem) {
        const select = document.querySelector(`#${formId} [name="${name}"]`);
        const previous = select.value;
        select.innerHTML = items.map((item) => {
          const [value, label] = mapItem(item);
          return `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`;
        }).join("");
        if (items.length === 0) return;
        const target = name === "channelId" ? state.channel?.id : name === "deviceId" ? getSelectedDeviceId() : previous;
        if (target && Array.from(select.options || []).some((option) => option.value === target)) {
          select.value = target;
          if (name === "deviceId") {
            state.selectedDeviceId = target;
          }
        }
      }

      function addEvent(event, ack) {
        const item = document.createElement("li");
        item.className = "item";
        item.textContent = `${event}: ${ack.ok ? "ok" : ack.error || "error"}`;
        el("events").prepend(item);
      }

      function setStatus(text) {
        el("connection-status").textContent = text;
      }

      async function restoreSession() {
        const session = readSession();
        if (!session) return false;
        const ack = await emit("auth:whoami", { token: session.token });
        if (!ack.ok) {
          clearSession();
          return false;
        }
        state.token = session.token;
        state.user = ack.user;
        state.team = ack.currentTeam;
        state.channel = session.channel || null;
        saveSession();
        render();
        await subscribe();
        return true;
      }

      function saveSession() {
        if (!state.token || !state.user || !state.team) return;
        localStorage.setItem(SESSION_KEY, JSON.stringify({
          token: state.token,
          user: state.user,
          team: state.team,
          channel: state.channel,
        }));
      }

      function readSession() {
        try {
          const raw = localStorage.getItem(SESSION_KEY);
          if (!raw) return null;
          const session = JSON.parse(raw);
          if (!session.token || !session.user?.id || !session.team?.id) return null;
          return session;
        } catch {
          return null;
        }
      }

      function clearSession() {
        localStorage.removeItem(SESSION_KEY);
        state.token = null;
        state.user = null;
        state.team = null;
        state.channel = null;
        state.channels = [];
        state.devices = [];
        state.runtimesByDevice = {};
        state.selectedDeviceId = null;
        state.agents = [];
        state.messages = [];
        render();
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
      }
    </script>
  </body>
</html>
