<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentBean Next Preview</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f4;
        color: #171717;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
      }
      main {
        display: grid;
        grid-template-columns: 208px minmax(0, 1fr) 320px;
        min-height: 100vh;
        height: 100vh;
      }
      aside {
        background: #fafafa;
        border-right: 1px solid #e5e5e5;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      section {
        min-width: 0;
      }
      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }
      h1 {
        font-size: 15px;
      }
      h2 {
        font-size: 13px;
      }
      form,
      .panel {
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: #ffffff;
        padding: 10px;
      }
      label {
        display: grid;
        gap: 5px;
        margin-bottom: 10px;
        font-size: 12px;
        color: #526067;
      }
      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid #d4d4d4;
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
        color: #171717;
        background: #fafafa;
      }
      textarea {
        min-height: 76px;
        resize: vertical;
      }
      button {
        border: 0;
        border-radius: 6px;
        background: #171717;
        color: #ffffff;
        padding: 8px 11px;
        font: inherit;
        cursor: pointer;
      }
      button.secondary {
        background: #525252;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }
      .brand {
        align-items: center;
        border-bottom: 1px solid #e5e5e5;
        display: flex;
        gap: 10px;
        min-height: 56px;
        padding: 0 14px;
      }
      .brand-mark {
        align-items: center;
        background: #171717;
        border-radius: 6px;
        color: #ffffff;
        display: inline-flex;
        font-weight: 700;
        height: 30px;
        justify-content: center;
        width: 30px;
      }
      .team-strip {
        border-bottom: 1px solid #e5e5e5;
        display: grid;
        gap: 8px;
        padding: 8px 12px 10px;
      }
      .team-form {
        display: grid;
        gap: 8px;
      }
      .team-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 46px;
        gap: 6px;
      }
      .team-row button {
        align-items: center;
        display: inline-flex;
        justify-content: center;
        padding: 0;
      }
      .team-form label {
        margin: 0;
      }
      .team-advanced {
        display: grid;
        gap: 6px;
      }
      body[data-auth="true"] .team-advanced {
        display: none;
      }
      .session-summary {
        color: #737373;
        display: none;
        font-size: 12px;
        margin: 0;
        overflow-wrap: anywhere;
      }
      body[data-auth="true"] .session-summary {
        display: block;
      }
      .sidebar-scroll {
        display: grid;
        align-content: start;
        gap: 10px;
        overflow: auto;
        padding: 12px 8px;
      }
      .nav-item {
        align-items: center;
        background: #e5e5e5b3;
        border-radius: 6px;
        display: flex;
        font-size: 14px;
        font-weight: 600;
        gap: 8px;
        padding: 7px 8px;
      }
      .section-title {
        color: #737373;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        margin: 8px 2px 6px;
        text-transform: uppercase;
      }
      .list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .item {
        border: 1px solid #e5e5e5;
        border-radius: 7px;
        padding: 10px;
        background: #ffffff;
        display: grid;
        gap: 4px;
      }
      .meta {
        color: #68747b;
        font-size: 12px;
        overflow-wrap: anywhere;
      }
      .primary {
        overflow-wrap: anywhere;
      }
      .status {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 3px 9px;
        background: #ecfdf5;
        color: #047857;
        font-size: 12px;
      }
      .workspace {
        background: #fafafa;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .conversation-header {
        align-items: center;
        background: #ffffff;
        border-bottom: 1px solid #e5e5e5;
        display: flex;
        justify-content: space-between;
        min-height: 56px;
        padding: 0 16px;
      }
      .channel-badge {
        align-items: center;
        background: #fff7ed;
        border-radius: 6px;
        color: #d97706;
        display: inline-flex;
        font-weight: 700;
        height: 32px;
        justify-content: center;
        width: 32px;
      }
      .title-row {
        align-items: center;
        display: flex;
        gap: 10px;
        min-width: 0;
      }
      .conversation {
        flex: 1;
        overflow: auto;
        padding: 16px;
      }
      .conversation-inner {
        display: grid;
        align-content: start;
        gap: 12px;
        min-height: 100%;
        margin: 0 auto;
        max-width: 768px;
      }
      .empty-state {
        align-items: center;
        color: #a3a3a3;
        display: flex;
        font-size: 14px;
        justify-content: center;
        min-height: 100%;
      }
      .message {
        border: 1px solid #e5e5e5;
        border-radius: 7px;
        display: grid;
        gap: 6px;
        padding: 10px 12px;
      }
      .message.human {
        background: #f0f9ff;
        border-color: #e0f2fe;
        color: #0c4a6e;
      }
      .message.agent {
        background: #ffffff;
      }
      .message.system {
        background: #fffbeb;
        border-color: #fde68a;
        color: #92400e;
        justify-self: center;
        max-width: 560px;
        text-align: center;
      }
      .message-head {
        align-items: center;
        color: #737373;
        display: flex;
        font-size: 12px;
        justify-content: space-between;
      }
      .message-speaker {
        font-weight: 700;
      }
      .message-body {
        font-size: 14px;
        line-height: 1.5;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }
      .composer {
        background: #ffffff;
        border-top: 1px solid #e5e5e5;
        padding: 12px 16px;
      }
      .composer form {
        border: 0;
        display: grid;
        gap: 8px;
        margin: 0 auto;
        max-width: 768px;
        padding: 0;
      }
      .composer textarea {
        background: #ffffff;
      }
      .composer-actions {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }
      .composer-actions label {
        margin: 0;
        max-width: 240px;
        width: 40%;
      }
      .right-rail {
        background: #fafafa;
        border-left: 1px solid #e5e5e5;
        display: grid;
        gap: 12px;
        align-content: start;
        overflow: auto;
        padding: 14px;
      }
      .rail-heading {
        align-items: center;
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .events {
        max-height: 168px;
        overflow: auto;
      }
      .compact-form {
        display: grid;
        gap: 8px;
      }
      .compact-form label {
        margin: 0;
      }
      @media (max-width: 860px) {
        main {
          height: auto;
          grid-template-columns: 1fr;
        }
        aside {
          border-right: 0;
          border-bottom: 1px solid #d7dad4;
          min-height: auto;
        }
        .right-rail {
          border-left: 0;
          border-top: 1px solid #e5e5e5;
        }
        .composer-actions {
          align-items: stretch;
          display: grid;
          gap: 8px;
        }
        .composer-actions label {
          max-width: none;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <div class="brand">
          <div class="brand-mark">A</div>
          <h1>AgentBean</h1>
          <p class="status" id="connection-status">连接中</p>
        </div>

        <div class="team-strip">
          <form class="team-form" id="auth-form">
            <div class="team-row">
              <label>当前 Team <input name="teamName" value="AgentBean" /></label>
              <button id="team-submit" type="submit" title="进入 AgentBean Next">进入</button>
            </div>
            <p class="session-summary" id="session-summary"></p>
            <div class="team-advanced">
              <label>用户名 <input name="username" value="shaw" autocomplete="username" /></label>
              <label>密码 <input name="password" value="secret" type="password" autocomplete="new-password" /></label>
            </div>
          </form>
        </div>

        <div class="sidebar-scroll">
          <div class="nav-item"># 聊天</div>
          <div class="nav-item">▣ 任务</div>
          <div class="nav-item">◎ 成员</div>
          <div class="nav-item">▱ 设备</div>
          <section>
            <div class="section-title">Channels</div>
            <ul class="list" id="channels"></ul>
          </section>
          <form class="compact-form" id="channel-create-form">
            <h2>新建 Channel</h2>
            <label>名称 <input name="name" value="ops" /></label>
            <label>标题 <input name="title" value="Ops" /></label>
            <label>可见性
              <select name="visibility">
                <option value="public">public</option>
                <option value="private">private</option>
              </select>
            </label>
            <button type="submit">创建 Channel</button>
          </form>
        </div>
      </aside>

      <section class="workspace">
        <div class="conversation-header">
          <div class="title-row">
            <div class="channel-badge">#</div>
            <div>
              <h2 id="active-channel-title">频道</h2>
              <div class="meta" id="active-channel-meta">公开频道</div>
            </div>
          </div>
          <span class="status">Next Preview</span>
        </div>
        <div class="conversation">
          <div class="conversation-inner" id="messages"></div>
        </div>
        <div class="composer">
          <form id="message-form">
            <label>内容 <textarea name="body">@Codex hello</textarea></label>
            <div class="composer-actions">
              <label>Channel <select name="channelId"></select></label>
              <button type="submit">发送消息</button>
            </div>
          </form>
        </div>
      </section>

      <section class="right-rail">
        <div class="panel">
          <div class="rail-heading"><h2>Devices</h2><span class="meta">daemon-next</span></div>
          <ul class="list" id="devices"></ul>
        </div>
        <div class="panel">
          <div class="rail-heading"><h2>Runtimes</h2><span class="meta">可运行环境</span></div>
          <ul class="list" id="runtimes"></ul>
        </div>
        <div class="panel">
          <div class="rail-heading"><h2>Agents</h2><span class="meta">custom</span></div>
          <ul class="list" id="agents"></ul>
        </div>
        <form class="compact-form" id="agent-create-form">
          <h2>Custom Agent</h2>
          <label>Device <select name="deviceId"></select></label>
          <label>Runtime <select name="runtimeId"></select></label>
          <label>名称 <input name="name" value="Codex" /></label>
          <label>Env Key <input name="envKey" value="OPENAI_API_KEY" /></label>
          <label>Env Value <input name="envValue" type="password" /></label>
          <button type="submit">创建 Agent</button>
        </form>
        <div class="panel events">
          <div class="rail-heading"><h2>Events</h2><span class="meta">socket</span></div>
          <ul class="list" id="events"></ul>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const SESSION_KEY = "agentbean-next-preview-session";
      const socket = io("/web", { transports: ["websocket", "polling"] });
      const state = { token: null, user: null, team: null, channel: null, channels: [], devices: [], runtimes: [], agents: [], messages: [] };
      const el = (id) => document.getElementById(id);

      socket.on("connect", async () => {
        setStatus("已连接");
        if (state.user && state.team) {
          await subscribe();
          return;
        }
        await restoreSession();
      });
      socket.on("disconnect", () => setStatus("已断开"));
      socket.on("devices:snapshot", (devices) => {
        state.devices = devices;
        render();
      });
      socket.on("device:runtimes", (payload) => {
        state.runtimes = payload.runtimes || [];
        render();
      });
      socket.on("agents:snapshot", (agents) => {
        state.agents = agents;
        render();
      });
      socket.on("channels:snapshot", (channels) => {
        state.channels = channels || [];
        state.channel = state.channels.find((channel) => channel.id === state.channel?.id) || state.channels[0] || state.channel;
        saveSession();
        render();
      });
      socket.on("channel:message", (message) => {
        state.messages.push(message);
        render();
      });

      el("auth-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(event.currentTarget));
        let ack = await emit("auth:register", data);
        if (!ack.ok && ack.error === "CONFLICT") {
          ack = await emit("auth:login", {
            username: data.username,
            password: data.password,
          });
        }
        if (!ack.ok) return;
        state.token = ack.token || null;
        state.user = ack.user;
        state.team = ack.currentTeam;
        state.channel = ack.defaultChannel || state.channel;
        saveSession();
        await subscribe();
        render();
      });

      el("channel-create-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!state.user || !state.team) return;
        const data = Object.fromEntries(new FormData(event.currentTarget));
        const ack = await emit("channel:create", {
          userId: state.user.id,
          teamId: state.team.id,
          name: data.name,
          title: data.title || undefined,
          visibility: data.visibility,
        });
        if (ack.ok && ack.channel) {
          state.channel = ack.channel;
          state.channels = [...state.channels.filter((channel) => channel.id !== ack.channel.id), ack.channel];
          saveSession();
          render();
        }
      });

      el("agent-create-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!state.user || !state.team) return;
        const data = Object.fromEntries(new FormData(event.currentTarget));
        const env = data.envKey && data.envValue ? { [data.envKey]: data.envValue } : undefined;
        await emit("agent:create", {
          userId: state.user.id,
          teamId: state.team.id,
          deviceId: data.deviceId,
          runtimeId: data.runtimeId || undefined,
          name: data.name,
          env,
        });
      });

      el("message-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!state.user || !state.team || !state.channel) return;
        const data = Object.fromEntries(new FormData(event.currentTarget));
        const ack = await emit("message:send", {
          userId: state.user.id,
          teamId: state.team.id,
          channelId: data.channelId || state.channel.id,
          body: data.body,
        });
        if (ack.ok && ack.message) {
          state.messages.push(ack.message);
          render();
        }
      });

      async function subscribe() {
        const payload = { userId: state.user.id, teamId: state.team.id };
        const devices = await emit("device:list", payload);
        const agents = await emit("agents:subscribe", payload);
        const channels = await emit("channels:subscribe", payload);
        if (!devices.ok || !agents.ok || !channels.ok) {
          clearSession();
        }
      }

      async function emit(event, payload) {
        const ack = await socket.emitWithAck(event, payload);
        addEvent(event, ack);
        return ack;
      }

      function render() {
        renderList("channels", state.channels, (channel) => renderItem(channel.title || channel.name, channel.visibility));
        renderList("devices", state.devices, (device) => renderItem(device.name || device.id, device.status));
        renderList("runtimes", state.runtimes, (runtime) => renderItem(runtime.name, runtime.command || "not installed"));
        renderList("agents", state.agents, (agent) => renderItem(agent.name, `${agent.status} · ${agent.source}`));
        renderMessages();
        renderActiveChannel();
        renderAuthState();
        fillSelect("agent-create-form", "deviceId", state.devices, (device) => [device.id, device.name || device.id]);
        fillSelect("agent-create-form", "runtimeId", state.runtimes, (runtime) => [runtime.id, runtime.name]);
        fillSelect("message-form", "channelId", state.channels, (channel) => [channel.id, channel.title || channel.name]);
      }

      function renderList(id, items, format) {
        el(id).innerHTML = items.map((item) => `<li class="item">${format(item)}</li>`).join("");
      }

      function renderItem(primary, meta) {
        return `<span class="primary">${escapeHtml(primary)}</span><span class="meta">${escapeHtml(meta)}</span>`;
      }

      function renderMessages() {
        if (state.messages.length === 0) {
          el("messages").innerHTML = `<div class="empty-state">这个频道还没有消息。</div>`;
          return;
        }
        el("messages").innerHTML = state.messages.map((message) => {
          const kind = message.senderKind || "system";
          const speaker = kind === "human" ? "你" : kind === "agent" ? "Agent" : "系统";
          const time = message.createdAt ? new Date(message.createdAt).toLocaleTimeString("zh-CN") : "";
          return `<article class="message ${escapeHtml(kind)}">
            <div class="message-head"><span class="message-speaker">${speaker}</span><span>${escapeHtml(time)}</span></div>
            <div class="message-body">${escapeHtml(message.body)}</div>
          </article>`;
        }).join("");
        el("messages").parentElement.scrollTop = el("messages").parentElement.scrollHeight;
      }

      function renderActiveChannel() {
        const active = state.channels.find((channel) => channel.id === state.channel?.id) || state.channel || state.channels[0];
        el("active-channel-title").textContent = active?.title || active?.name || "频道";
        el("active-channel-meta").textContent = active?.visibility === "private" ? "私有频道" : "公开频道";
      }

      function renderAuthState() {
        const authenticated = Boolean(state.user && state.team);
        document.body.dataset.auth = authenticated ? "true" : "false";
        el("team-submit").textContent = authenticated ? "切换" : "进入";
        el("session-summary").textContent = authenticated
          ? `${state.user.username || state.user.name || state.user.id} · ${state.team.name || state.team.id}`
          : "";
      }

      function fillSelect(formId, name, items, mapItem) {
        const select = document.querySelector(`#${formId} [name="${name}"]`);
        const previous = select.value;
        select.innerHTML = items.map((item) => {
          const [value, label] = mapItem(item);
          return `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`;
        }).join("");
        if (items.length === 0) return;
        const target = name === "channelId" ? state.channel?.id : previous;
        if (target && Array.from(select.options || []).some((option) => option.value === target)) {
          select.value = target;
        }
      }

      function addEvent(event, ack) {
        const item = document.createElement("li");
        item.className = "item";
        item.textContent = `${event}: ${ack.ok ? "ok" : ack.error || "error"}`;
        el("events").prepend(item);
      }

      function setStatus(text) {
        el("connection-status").textContent = text;
      }

      async function restoreSession() {
        const session = readSession();
        if (!session) return;
        const ack = await emit("auth:whoami", { token: session.token });
        if (!ack.ok) {
          clearSession();
          return;
        }
        state.token = session.token;
        state.user = ack.user;
        state.team = ack.currentTeam;
        state.channel = session.channel || null;
        saveSession();
        render();
        await subscribe();
      }

      function saveSession() {
        if (!state.token || !state.user || !state.team) return;
        localStorage.setItem(SESSION_KEY, JSON.stringify({
          token: state.token,
          user: state.user,
          team: state.team,
          channel: state.channel,
        }));
      }

      function readSession() {
        try {
          const raw = localStorage.getItem(SESSION_KEY);
          if (!raw) return null;
          const session = JSON.parse(raw);
          if (!session.token || !session.user?.id || !session.team?.id) return null;
          return session;
        } catch {
          return null;
        }
      }

      function clearSession() {
        localStorage.removeItem(SESSION_KEY);
        state.token = null;
        state.user = null;
        state.team = null;
        state.channel = null;
        state.channels = [];
        state.devices = [];
        state.runtimes = [];
        state.agents = [];
        state.messages = [];
        render();
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
      }
    </script>
  </body>
</html>
