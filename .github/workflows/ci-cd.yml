name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agentbean-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            app_dir: apps/web
            lockfile: apps/web/package-lock.json
          - name: server
            app_dir: apps/server
            lockfile: apps/server/package-lock.json
          - name: daemon
            app_dir: apps/daemon
            lockfile: apps/daemon/package-lock.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect app changes
        id: changes
        working-directory: .
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          if [ "${{ matrix.app_dir }}" = "apps/web" ]; then
            app_changed_files="$(printf '%s\n' "$changed_files" | grep -E '^apps/web/' | grep -Ev '^apps/web/vercel\.json$' || true)"
          else
            app_changed_files="$(printf '%s\n' "$changed_files" | grep -E "^${{ matrix.app_dir }}/" || true)"
          fi

          if [ -n "$app_changed_files" ]; then
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes under ${{ matrix.app_dir }}; skipping validation for this app."
            echo "should_validate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.changes.outputs.should_validate == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Ensure localhost resolves
        if: steps.changes.outputs.should_validate == 'true'
        run: |
          grep -qE '(^|[[:space:]])localhost([[:space:]]|$)' /etc/hosts || \
            echo '127.0.0.1 localhost' | sudo tee -a /etc/hosts

      - name: Install dependencies
        if: steps.changes.outputs.should_validate == 'true'
        working-directory: ${{ matrix.app_dir }}
        run: npm --workspaces=false ci

      - name: Run tests
        if: steps.changes.outputs.should_validate == 'true'
        working-directory: ${{ matrix.app_dir }}
        run: npm --workspaces=false test -- --api.host 127.0.0.1

      - name: Build
        if: steps.changes.outputs.should_validate == 'true'
        working-directory: ${{ matrix.app_dir }}
        run: npm --workspaces=false run build

  validate-agentbean-next:
    name: Validate AgentBean Next
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect AgentBean Next changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          next_changed_files="$(printf '%s\n' "$changed_files" | grep -E '^agentbean-next/|^packages/|^apps/(server-next|daemon-next|web-next)/|^package\.json$|^\.github/workflows/ci-cd\.yml$' || true)"

          if [ -n "$next_changed_files" ]; then
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
          else
            echo "No AgentBean Next changes; skipping validation."
            echo "should_validate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.changes.outputs.should_validate == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: |
            apps/server/package-lock.json
            package-lock.json

      - name: Ensure localhost resolves
        if: steps.changes.outputs.should_validate == 'true'
        run: |
          grep -qE '(^|[[:space:]])localhost([[:space:]]|$)' /etc/hosts || \
            echo '127.0.0.1 localhost' | sudo tee -a /etc/hosts

      - name: Verify AgentBean Next root install plan
        if: steps.changes.outputs.should_validate == 'true'
        run: npm ci --ignore-scripts

      - name: Install shared validation dependencies
        if: steps.changes.outputs.should_validate == 'true'
        working-directory: apps/server
        run: npm --workspaces=false ci

      - name: Run AgentBean Next phase tests
        if: steps.changes.outputs.should_validate == 'true'
        run: |
          node apps/server/node_modules/vitest/vitest.mjs run \
            packages/contracts/tests \
            packages/domain/tests \
            apps/server-next/tests \
            apps/daemon-next/tests \
            apps/web-next/tests \
            --environment node \
            --api.host 127.0.0.1

      - name: Build AgentBean Next packages
        if: steps.changes.outputs.should_validate == 'true'
        run: |
          apps/server/node_modules/.bin/tsc -p packages/contracts/tsconfig.json
          apps/server/node_modules/.bin/tsc -p packages/domain/tsconfig.json
          apps/server/node_modules/.bin/tsc -p apps/server-next/tsconfig.json --typeRoots apps/server/node_modules/@types
          apps/server/node_modules/.bin/tsc -p apps/daemon-next/tsconfig.json --typeRoots apps/server/node_modules/@types
          apps/server/node_modules/.bin/tsc -p apps/web-next/tsconfig.json

      - name: Run AgentBean Next preview smoke
        if: steps.changes.outputs.should_validate == 'true'
        run: |
          node apps/server/node_modules/vitest/vitest.mjs run \
            apps/server-next/tests/e2e-first-slice.test.ts \
            --environment node \
            --api.host 127.0.0.1 \
            -t "runtime capability -> custom agent -> message -> daemon reply"

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - validate
      - validate-agentbean-next
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30

    env:
      AGENTBEAN_DEPLOY_TARGET: ${{ vars.AGENTBEAN_DEPLOY_TARGET || 'old' }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: c6b70675-f7d5-47a1-a8e7-05b37d13e476
      RAILWAY_SERVICE_ID: 7b1dce9b-b7e7-4cfb-bb3f-ef86d10e8647
      RAILWAY_ENVIRONMENT: e9c1a221-28b1-49c0-b279-be249a428737

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js for Railway CLI
        if: env.RAILWAY_TOKEN != ''
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      - name: Install Railway CLI
        if: env.RAILWAY_TOKEN != ''
        run: npm install -g @railway/cli

      - name: Deploy Railway backend
        if: env.RAILWAY_TOKEN != ''
        run: |
          case "${AGENTBEAN_DEPLOY_TARGET}" in
            old)
              deploy_path="apps/server"
              ;;
            next)
              deploy_path="."
              ;;
            *)
              echo "::error::AGENTBEAN_DEPLOY_TARGET must be old or next, got '${AGENTBEAN_DEPLOY_TARGET}'"
              exit 1
              ;;
          esac

          for attempt in 1 2 3 4 5; do
            echo "Railway deploy attempt ${attempt}/5"
            if railway up "$deploy_path" \
              --ci \
              --path-as-root \
              --project "$RAILWAY_PROJECT_ID" \
              --service "$RAILWAY_SERVICE_ID" \
              --environment "$RAILWAY_ENVIRONMENT" \
              --verbose; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Skip Railway deploy
        if: env.RAILWAY_TOKEN == ''
        run: echo "::notice::RAILWAY_TOKEN is not configured; skipping Railway deploy."

  publish:
    name: Publish agent to npm
    runs-on: ubuntu-latest
    needs:
      - validate
      - validate-agentbean-next
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Check out repository
        if: env.NPM_TOKEN != ''
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: env.NPM_TOKEN != ''
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: apps/daemon/package-lock.json

      - name: Install, build, and publish
        id: agent-package
        if: env.NPM_TOKEN != ''
        working-directory: apps/daemon
        run: |
          npm --workspaces=false ci
          npm --workspaces=false run build
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "@agentbean/daemon@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::notice::@agentbean/daemon@$PKG_VERSION is already published; skipping npm publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish npm package
        if: env.NPM_TOKEN != '' && steps.agent-package.outputs.should_publish == 'true'
        working-directory: apps/daemon
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npm publish
        if: env.NPM_TOKEN == ''
        run: echo "::notice::NPM_TOKEN is not configured; skipping npm publish."
