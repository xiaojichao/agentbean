name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agentbean-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            app_dir: apps/web
            lockfile: apps/web/package-lock.json
          - name: server
            app_dir: apps/server
            lockfile: apps/server/package-lock.json
          - name: agent
            app_dir: apps/agent
            lockfile: apps/agent/package-lock.json

    defaults:
      run:
        working-directory: ${{ matrix.app_dir }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Ensure localhost resolves
        run: |
          grep -qE '(^|[[:space:]])localhost([[:space:]]|$)' /etc/hosts || \
            echo '127.0.0.1 localhost' | sudo tee -a /etc/hosts

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30

    env:
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: c6b70675-f7d5-47a1-a8e7-05b37d13e476
      RAILWAY_SERVICE_ID: 7b1dce9b-b7e7-4cfb-bb3f-ef86d10e8647
      RAILWAY_ENVIRONMENT: e9c1a221-28b1-49c0-b279-be249a428737

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Trigger Vercel frontend deploy
        if: env.VERCEL_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"

      - name: Skip Vercel deploy
        if: env.VERCEL_DEPLOY_HOOK_URL == ''
        run: echo "::notice::VERCEL_DEPLOY_HOOK_URL is not configured; skipping Vercel deploy."

      - name: Set up Node.js for Railway CLI
        if: env.RAILWAY_TOKEN != ''
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Railway CLI
        if: env.RAILWAY_TOKEN != ''
        run: npm install -g @railway/cli

      - name: Deploy Railway backend
        if: env.RAILWAY_TOKEN != ''
        run: >
          railway up apps/server
          --ci
          --path-as-root
          --project "$RAILWAY_PROJECT_ID"
          --service "$RAILWAY_SERVICE_ID"
          --environment "$RAILWAY_ENVIRONMENT"

      - name: Skip Railway deploy
        if: env.RAILWAY_TOKEN == ''
        run: echo "::notice::RAILWAY_TOKEN is not configured; skipping Railway deploy."

  publish:
    name: Publish agent to npm
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Check out repository
        if: env.NPM_TOKEN != ''
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: env.NPM_TOKEN != ''
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: apps/agent/package-lock.json

      - name: Install, build, and publish
        id: agent-package
        if: env.NPM_TOKEN != ''
        working-directory: apps/agent
        run: |
          npm ci
          npm run build
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "@agentbean/daemon@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::notice::@agentbean/daemon@$PKG_VERSION is already published; skipping npm publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish npm package
        if: env.NPM_TOKEN != '' && steps.agent-package.outputs.should_publish == 'true'
        working-directory: apps/agent
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npm publish
        if: env.NPM_TOKEN == ''
        run: echo "::notice::NPM_TOKEN is not configured; skipping npm publish."
