name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_production_deploy:
        description: Run Railway production deploy during this manual dispatch.
        required: true
        default: false
        type: boolean
      run_railway_preflight:
        description: Run read-only Railway AgentBean Next production preflight without deploying.
        required: true
        default: false
        type: boolean
      sync_railway_next_runtime_env:
        description: Sync AgentBean Next runtime variables into Railway without deploying.
        required: true
        default: false
        type: boolean
      run_agentbean_next_production_smoke:
        description: Run AgentBean Next entry and business smoke against a deployed URL.
        required: true
        default: false
        type: boolean
      agentbean_next_entry_url:
        description: AgentBean Next deployed URL for production smoke. Falls back to repository variable AGENTBEAN_NEXT_ENTRY_URL.
        required: false
        default: ''
        type: string
      promote_agentbean_daemon_latest:
        description: Promote canonical @agentbean/daemon npm latest dist-tag to the daemon-next version. Outward-facing; run only when ready to make daemon-next the default npm install.
        required: true
        default: false
        type: boolean
      skip_npm_publish:
        description: Skip npm publish jobs for content-only workflow dispatches such as the daily changelog deploy.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: agentbean-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-agentbean-next:
    name: Validate AgentBean Next
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect AgentBean Next changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          next_changed_files="$(printf '%s\n' "$changed_files" | grep -E '^agentbean-next/|^packages/|^apps/(server-next|daemon-next|web-next)/|^scripts/(check-agentbean-next-readiness|check-agentbean-next-railway-preflight|check-team-terminology(\.test)?|check-phase-0-pi-boundary(\.test)?|check-phase-1-management-boundary(\.test)?|check-phase-2-task-dag-boundary(\.test)?|check-pi-management-sea(\.test)?|build-pi-management-sea(\.test)?|audit-agentbean-next-cutover|prepare-agentbean-next-daemon-release|smoke-agentbean-next-.*)\.mjs$|^docs/superpowers/specs/|^README\.md$|^\.nvmrc$|^package(-lock)?\.json$|^railway\.json$|^\.github/workflows/(ci-cd|daily-changelog|pi-sea-compatibility)\.yml$' || true)"

          if [ -n "$next_changed_files" ]; then
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
          else
            echo "No AgentBean Next changes; skipping validation."
            echo "should_validate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.changes.outputs.should_validate == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Ensure localhost resolves
        if: steps.changes.outputs.should_validate == 'true'
        run: |
          grep -qE '(^|[[:space:]])localhost([[:space:]]|$)' /etc/hosts || \
            echo '127.0.0.1 localhost' | sudo tee -a /etc/hosts

      - name: Install AgentBean Next workspace dependencies
        if: steps.changes.outputs.should_validate == 'true'
        run: npm ci

      - name: Run AgentBean Next readiness checks
        if: steps.changes.outputs.should_validate == 'true'
        run: npm run check:agentbean-next-readiness

      - name: Enforce Team terminology
        if: steps.changes.outputs.should_validate == 'true'
        run: |
          npm run test:team-terminology
          npm run check:team-terminology

      - name: Run AgentBean Next phase tests
        if: steps.changes.outputs.should_validate == 'true'
        run: npm run test:phase1

      - name: Run Phase 0 PI gates
        if: steps.changes.outputs.should_validate == 'true'
        run: npm run test:phase0

      - name: Run Phase 1 management gates
        if: steps.changes.outputs.should_validate == 'true'
        run: npm run test:phase1-management

      - name: Run Phase 2 Task DAG gates
        if: steps.changes.outputs.should_validate == 'true'
        run: npm run test:phase2-task-dag

      - name: Run Phase 2 real two-Agent closeout smoke
        if: steps.changes.outputs.should_validate == 'true'
        run: npm run test:phase2-closeout

      - name: Build Phase 0 packages
        if: steps.changes.outputs.should_validate == 'true'
        run: npm run build:phase0

      - name: Build Phase 1 management packages
        if: steps.changes.outputs.should_validate == 'true'
        run: npm run build:phase1-management

      - name: Build Phase 2 Task DAG packages
        if: steps.changes.outputs.should_validate == 'true'
        run: npm run build:phase2-task-dag

      - name: Build AgentBean Next packages
        if: steps.changes.outputs.should_validate == 'true'
        run: npm run build:packages

      - name: Verify changelog generated file is fresh
        if: steps.changes.outputs.should_validate == 'true'
        run: |
          node_modules/.bin/tsx apps/web-next/scripts/gen-changelog.ts
          git diff --exit-code apps/web-next/lib/releases.generated.ts

      - name: Run AgentBean Next daemon install smoke
        if: steps.changes.outputs.should_validate == 'true'
        run: npm run smoke:agentbean-next-daemon-install -- --skip-build

      - name: Run AgentBean Next preview smoke
        if: steps.changes.outputs.should_validate == 'true'
        run: |
          node node_modules/vitest/vitest.mjs run \
            apps/server-next/tests/e2e-first-slice.test.ts \
            --environment node \
            --api.host 127.0.0.1 \
            -t "runtime capability -> custom agent -> message -> daemon reply"

      - name: Run AgentBean Next browser smoke
        if: steps.changes.outputs.should_validate == 'true'
        env:
          AGENTBEAN_NEXT_BROWSER_SMOKE_ARTIFACTS_DIR: artifacts/agentbean-next-browser-smoke
          CHROME_BIN: /usr/bin/google-chrome
        run: npm run smoke:agentbean-next-browser -- --skip-build --timeout-ms 60000

      - name: Upload AgentBean Next browser smoke artifacts
        if: steps.changes.outputs.should_validate == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: agentbean-next-browser-smoke
          path: artifacts/agentbean-next-browser-smoke
          if-no-files-found: ignore

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - validate-agentbean-next
      - publish
    if: always() && needs.validate-agentbean-next.result == 'success' && (needs.publish.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.skip_npm_publish && needs.publish.result == 'skipped')) && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_production_deploy))
    timeout-minutes: 30

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: c6b70675-f7d5-47a1-a8e7-05b37d13e476
      RAILWAY_SERVICE_ID: 7b1dce9b-b7e7-4cfb-bb3f-ef86d10e8647
      RAILWAY_ENVIRONMENT: e9c1a221-28b1-49c0-b279-be249a428737

    steps:
      - name: Reject production deploy when npm publish is skipped
        if: github.event_name == 'workflow_dispatch' && inputs.run_production_deploy && inputs.skip_npm_publish
        run: |
          echo "::error::Manual production deploy cannot use skip_npm_publish=true; publish must complete before deploy."
          exit 1

      - name: Require RAILWAY_TOKEN for production deploy
        if: env.RAILWAY_TOKEN == ''
        run: |
          echo "::error::RAILWAY_TOKEN is required for production deploy; deploy cannot be skipped silently."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js for Railway CLI
        if: env.RAILWAY_TOKEN != ''
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Run AgentBean Next production readiness checks
        if: env.RAILWAY_TOKEN != ''
        env:
          AGENTBEAN_NEXT_SESSION_SECRET: ${{ secrets.AGENTBEAN_NEXT_SESSION_SECRET }}
          AGENTBEAN_NEXT_DATA_DIR: ${{ vars.AGENTBEAN_NEXT_DATA_DIR }}
        run: npm run check:agentbean-next-readiness -- --production

      - name: Require production smoke for manual AgentBean Next deploy
        if: github.event_name == 'workflow_dispatch' && inputs.run_production_deploy && !inputs.run_agentbean_next_production_smoke
        run: |
          echo "::error::Manual AgentBean Next production deploy requires run_agentbean_next_production_smoke=true."
          exit 1

      - name: Install Railway CLI
        if: env.RAILWAY_TOKEN != ''
        run: npm install -g @railway/cli

      - name: Deploy Railway backend
        if: env.RAILWAY_TOKEN != ''
        run: |
          for attempt in 1 2 3; do
            echo "Railway deploy attempt ${attempt}/3"
            if timeout 8m railway up . \
              --ci \
              --path-as-root \
              --project "$RAILWAY_PROJECT_ID" \
              --service "$RAILWAY_SERVICE_ID" \
              --environment "$RAILWAY_ENVIRONMENT" \
              --verbose; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

  railway-next-preflight:
    name: Railway Next preflight
    runs-on: ubuntu-latest
    needs:
      - validate-agentbean-next
    if: github.event_name == 'workflow_dispatch' && inputs.run_railway_preflight
    timeout-minutes: 10

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: c6b70675-f7d5-47a1-a8e7-05b37d13e476
      RAILWAY_SERVICE_ID: 7b1dce9b-b7e7-4cfb-bb3f-ef86d10e8647
      RAILWAY_ENVIRONMENT: e9c1a221-28b1-49c0-b279-be249a428737
      AGENTBEAN_NEXT_SESSION_SECRET: ${{ secrets.AGENTBEAN_NEXT_SESSION_SECRET }}
      AGENTBEAN_NEXT_DATA_DIR: ${{ vars.AGENTBEAN_NEXT_DATA_DIR }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js for Railway CLI
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Run AgentBean Next production readiness checks
        run: npm run check:agentbean-next-readiness -- --production

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Run Railway AgentBean Next preflight
        run: npm run check:agentbean-next-railway-preflight

  railway-next-env-sync:
    name: Railway Next env sync
    runs-on: ubuntu-latest
    needs:
      - validate-agentbean-next
    if: github.event_name == 'workflow_dispatch' && inputs.sync_railway_next_runtime_env
    timeout-minutes: 10

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: c6b70675-f7d5-47a1-a8e7-05b37d13e476
      RAILWAY_SERVICE_ID: 7b1dce9b-b7e7-4cfb-bb3f-ef86d10e8647
      RAILWAY_ENVIRONMENT: e9c1a221-28b1-49c0-b279-be249a428737
      AGENTBEAN_NEXT_SESSION_SECRET: ${{ secrets.AGENTBEAN_NEXT_SESSION_SECRET }}
      AGENTBEAN_NEXT_DATA_DIR: ${{ vars.AGENTBEAN_NEXT_DATA_DIR }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js for Railway CLI
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Run AgentBean Next production readiness checks
        run: npm run check:agentbean-next-readiness -- --production

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Sync Railway AgentBean Next runtime env
        run: |
          railway variable set "AGENTBEAN_NEXT_DATA_DIR=${AGENTBEAN_NEXT_DATA_DIR}" \
            --service "$RAILWAY_SERVICE_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --skip-deploys

          printf '%s' "$AGENTBEAN_NEXT_SESSION_SECRET" | railway variable set AGENTBEAN_NEXT_SESSION_SECRET \
            --service "$RAILWAY_SERVICE_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --stdin \
            --skip-deploys

      - name: Verify Railway AgentBean Next preflight
        run: npm run check:agentbean-next-railway-preflight

  agentbean-next-production-smoke:
    name: AgentBean Next production smoke
    runs-on: ubuntu-latest
    needs:
      - validate-agentbean-next
      - deploy
      - publish
    if: always() && needs.validate-agentbean-next.result == 'success' && ((github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.publish.result == 'success' && needs.deploy.result == 'success') || (github.event_name == 'workflow_dispatch' && inputs.run_agentbean_next_production_smoke && (needs.publish.result == 'success' || needs.publish.result == 'skipped') && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')))
    timeout-minutes: 15

    env:
      AGENTBEAN_NEXT_DATA_DIR: ${{ vars.AGENTBEAN_NEXT_DATA_DIR }}
      AGENTBEAN_NEXT_AUDIT_ENTRY_URL: ${{ vars.AGENTBEAN_NEXT_ENTRY_URL }}
      AGENTBEAN_NEXT_ENTRY_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.agentbean_next_entry_url || vars.AGENTBEAN_NEXT_ENTRY_URL }}
      AGENTBEAN_NEXT_SESSION_SECRET: ${{ secrets.AGENTBEAN_NEXT_SESSION_SECRET }}
      GH_TOKEN: ${{ github.token }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root smoke dependencies
        run: npm ci --ignore-scripts

      - name: Verify production smoke target URL
        run: |
          if [ -z "$AGENTBEAN_NEXT_ENTRY_URL" ]; then
            echo "::error::AGENTBEAN_NEXT_ENTRY_URL is required. Set workflow input agentbean_next_entry_url or repository variable AGENTBEAN_NEXT_ENTRY_URL."
            exit 1
          fi

      - name: Run AgentBean Next strict cutover audit
        run: npm run audit:agentbean-next-cutover

      - name: Wait for production server healthcheck
        run: |
          echo "Waiting for $AGENTBEAN_NEXT_ENTRY_URL to become healthy..."
          for attempt in $(seq 1 30); do
            if curl -sf "$AGENTBEAN_NEXT_ENTRY_URL/healthz" >/dev/null; then
              echo "Server healthy after ${attempt} attempt(s)"
              exit 0
            fi
            echo "Attempt ${attempt}/30: not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "::error::Production server did not become healthy within 150s"
          exit 1

      - name: Run AgentBean Next public entry smoke
        run: npm run smoke:agentbean-next-entry

      - name: Run AgentBean Next business smoke
        run: npm run smoke:agentbean-next-business

  publish:
    name: Publish agent to npm
    runs-on: ubuntu-latest
    needs:
      - validate-agentbean-next
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.skip_npm_publish && !inputs.run_railway_preflight && !inputs.sync_railway_next_runtime_env && !inputs.promote_agentbean_daemon_latest)
    timeout-minutes: 15

    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Require NPM_TOKEN for npm publish
        if: env.NPM_TOKEN == ''
        run: |
          echo "::error::NPM_TOKEN is required for npm publish; publish cannot be skipped silently."
          exit 1

      - name: Check out repository
        if: env.NPM_TOKEN != ''
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: env.NPM_TOKEN != ''
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify legacy daemon historical archive dist-tag
        if: env.NPM_TOKEN != ''
        run: |
          LEGACY_TAG="$(npm view "@agentbean/daemon" dist-tags --json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).legacy || ''")"
          if [ "$LEGACY_TAG" != "0.1.35" ]; then
            echo "::error::npm @agentbean/daemon legacy must remain pinned to the historical archive 0.1.35, observed '$LEGACY_TAG'."
            exit 1
          fi
          npm view "@agentbean/daemon@$LEGACY_TAG" version >/dev/null
          echo "npm @agentbean/daemon dist-tags.legacy=$LEGACY_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install and build AgentBean Next npm packages
        id: agentbean-next-packages
        if: env.NPM_TOKEN != ''
        run: |
          npm ci
          npm run build:contracts
          npm run build:pi-management-runtime
          npm run build:daemon-next
          node scripts/prepare-agentbean-next-daemon-release.mjs --out .agentbean-next-release/daemon

          CONTRACTS_VERSION="$(node -p "require('./packages/contracts/package.json').version")"
          PI_RUNTIME_VERSION="$(node -p "require('./packages/pi-management-runtime/package.json').version")"
          DAEMON_NEXT_VERSION="$(node -p "require('./apps/daemon-next/package.json').version")"
          CANONICAL_DAEMON_VERSION="$(node -p "require('./.agentbean-next-release/daemon/package.json').version")"

          if npm view "@agentbean/contracts@$CONTRACTS_VERSION" version >/dev/null 2>&1; then
            echo "::notice::@agentbean/contracts@$CONTRACTS_VERSION is already published; skipping npm publish."
            echo "should_publish_contracts=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish_contracts=true" >> "$GITHUB_OUTPUT"
          fi

          if npm view "@agentbean/pi-management-runtime@$PI_RUNTIME_VERSION" version >/dev/null 2>&1; then
            echo "::notice::@agentbean/pi-management-runtime@$PI_RUNTIME_VERSION is already published; skipping npm publish."
            echo "should_publish_pi_runtime=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish_pi_runtime=true" >> "$GITHUB_OUTPUT"
          fi

          if npm view "@agentbean/daemon-next@$DAEMON_NEXT_VERSION" version >/dev/null 2>&1; then
            echo "::notice::@agentbean/daemon-next@$DAEMON_NEXT_VERSION is already published; skipping npm publish."
            echo "should_publish_daemon_next=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish_daemon_next=true" >> "$GITHUB_OUTPUT"
          fi

          if npm view "@agentbean/daemon@$CANONICAL_DAEMON_VERSION" version >/dev/null 2>&1; then
            echo "::notice::@agentbean/daemon@$CANONICAL_DAEMON_VERSION is already published; skipping npm publish."
            echo "should_publish_canonical_daemon=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish_canonical_daemon=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish AgentBean Next contracts package
        if: env.NPM_TOKEN != '' && steps.agentbean-next-packages.outputs.should_publish_contracts == 'true'
        working-directory: packages/contracts
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish AgentBean PI management runtime package
        if: env.NPM_TOKEN != '' && steps.agentbean-next-packages.outputs.should_publish_pi_runtime == 'true'
        working-directory: packages/pi-management-runtime
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish AgentBean Next daemon package
        if: env.NPM_TOKEN != '' && steps.agentbean-next-packages.outputs.should_publish_daemon_next == 'true'
        working-directory: apps/daemon-next
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish AgentBean Next canonical daemon package
        if: env.NPM_TOKEN != '' && steps.agentbean-next-packages.outputs.should_publish_canonical_daemon == 'true'
        working-directory: .agentbean-next-release/daemon
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  promote-agentbean-daemon-latest:
    name: Promote canonical daemon npm latest
    runs-on: ubuntu-latest
    needs:
      - validate-agentbean-next
    if: github.event_name == 'workflow_dispatch' && inputs.promote_agentbean_daemon_latest
    timeout-minutes: 10

    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Require NPM_TOKEN for latest promotion
        if: env.NPM_TOKEN == ''
        run: |
          echo "::error::NPM_TOKEN is required when promote_agentbean_daemon_latest=true; latest promotion cannot be skipped silently."
          exit 1

      - name: Check out repository
        if: env.NPM_TOKEN != ''
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: env.NPM_TOKEN != ''
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org

      - name: Resolve canonical daemon-next version
        if: env.NPM_TOKEN != ''
        id: versions
        run: |
          DAEMON_NEXT_VERSION="$(node -p "require('./apps/daemon-next/package.json').version")"
          echo "daemon_next_version=$DAEMON_NEXT_VERSION" >> "$GITHUB_OUTPUT"
          if ! npm view "@agentbean/daemon@$DAEMON_NEXT_VERSION" version >/dev/null 2>&1; then
            echo "::error::@agentbean/daemon@$DAEMON_NEXT_VERSION is not published yet; publish daemon-next before promoting latest."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify legacy daemon historical archive before latest promotion
        if: env.NPM_TOKEN != ''
        run: |
          LEGACY_TAG="$(npm view "@agentbean/daemon" dist-tags --json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).legacy || ''")"
          if [ "$LEGACY_TAG" != "0.1.35" ]; then
            echo "::error::npm @agentbean/daemon legacy must remain pinned to the historical archive 0.1.35, observed '$LEGACY_TAG'."
            exit 1
          fi
          npm view "@agentbean/daemon@$LEGACY_TAG" version >/dev/null
          echo "npm @agentbean/daemon dist-tags.legacy=$LEGACY_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Promote canonical daemon to npm latest
        if: env.NPM_TOKEN != ''
        run: |
          echo "::notice::Promoting @agentbean/daemon@${{ steps.versions.outputs.daemon_next_version }} to npm latest dist-tag."
          npm dist-tag add "@agentbean/daemon@${{ steps.versions.outputs.daemon_next_version }}" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm latest points to daemon-next
        if: env.NPM_TOKEN != ''
        run: |
          LATEST=""
          for attempt in $(seq 1 12); do
            LATEST="$(npm view "@agentbean/daemon" dist-tags --json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).latest || ''")"
            if [ "$LATEST" = "${{ steps.versions.outputs.daemon_next_version }}" ]; then
              break
            fi
            echo "::notice::Waiting for npm latest dist-tag propagation (${attempt}/12); observed '$LATEST'."
            sleep 5
          done
          echo "npm @agentbean/daemon dist-tags.latest=$LATEST"
          if [ "$LATEST" != "${{ steps.versions.outputs.daemon_next_version }}" ]; then
            echo "::error::npm latest ($LATEST) does not match daemon-next (${{ steps.versions.outputs.daemon_next_version }})."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
