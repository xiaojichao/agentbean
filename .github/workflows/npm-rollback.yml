name: NPM Rollback

on:
  workflow_dispatch:
    inputs:
      package:
        description: npm package name (e.g. @agentbean/daemon)
        required: true
      version:
        description: Target version to point latest to (e.g. 0.1.35)
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          registry-url: https://registry.npmjs.org

      - name: Point latest tag to ${{ inputs.version }}
        run: npm dist-tag add "${{ inputs.package }}@${{ inputs.version }}" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
