name: PI SEA compatibility

on:
  push:
    branches:
      - main
    paths:
      - packages/pi-management-runtime/**
      - packages/contracts/**
      - packages/domain/**
      - apps/server-next/tests/phase-0-management-boundary.test.ts
      - scripts/build-pi-management-sea.mjs
      - scripts/build-pi-management-sea.test.mjs
      - scripts/check-pi-management-sea.mjs
      - scripts/check-pi-management-sea.test.mjs
      - scripts/check-phase-0-pi-boundary.mjs
      - scripts/check-phase-0-pi-boundary.test.mjs
      - agentbean-next/docs/phase-0-pi-contract-compatibility-verification-matrix.md
      - package.json
      - package-lock.json
      - .github/workflows/pi-sea-compatibility.yml
  pull_request:
    branches:
      - main
    paths:
      - packages/pi-management-runtime/**
      - packages/contracts/**
      - packages/domain/**
      - apps/server-next/tests/phase-0-management-boundary.test.ts
      - scripts/build-pi-management-sea.mjs
      - scripts/build-pi-management-sea.test.mjs
      - scripts/check-pi-management-sea.mjs
      - scripts/check-pi-management-sea.test.mjs
      - scripts/check-phase-0-pi-boundary.mjs
      - scripts/check-phase-0-pi-boundary.test.mjs
      - agentbean-next/docs/phase-0-pi-contract-compatibility-verification-matrix.md
      - package.json
      - package-lock.json
      - .github/workflows/pi-sea-compatibility.yml
  workflow_dispatch:
    inputs:
      phase5_credential_probe:
        description: Run only the throwaway Phase 5 credential-store prototype
        required: false
        type: boolean
        default: false
      phase5_credential_platform:
        description: Platform for the throwaway credential-store prototype
        required: false
        type: choice
        default: windows
        options:
          - windows
          - linux

permissions:
  contents: read

concurrency:
  group: pi-sea-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-verdict:
    if: inputs.phase5_credential_probe != true
    name: SEA ${{ matrix.verdict_os }} ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            verdict_os: linux
            arch: x64
          - runner: macos-14
            verdict_os: macos
            arch: arm64
          - runner: windows-latest
            verdict_os: windows
            arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Initialize fail-closed platform verdict
        run: node scripts/check-pi-management-sea.mjs init --out artifacts/pi-sea-verdict/verdict.json --os ${{ matrix.verdict_os }} --arch ${{ matrix.arch }}

      - name: Set up Node.js 24.18.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked workspace dependencies
        run: npm ci

      - name: Verify SEA build and verdict contracts
        run: node --test scripts/check-pi-management-sea.test.mjs scripts/build-pi-management-sea.test.mjs

      - name: Build and execute PI management SEA
        run: node scripts/build-pi-management-sea.mjs --out-dir .sea/${{ matrix.verdict_os }}-${{ matrix.arch }} --verdict artifacts/pi-sea-verdict/verdict.json --os ${{ matrix.verdict_os }} --arch ${{ matrix.arch }}

      - name: Consume platform verdict through root gate
        if: always()
        run: npm run check:pi-sea-compatibility -- --file artifacts/pi-sea-verdict/verdict.json

      - name: Upload platform verdict
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pi-sea-verdict-${{ matrix.verdict_os }}-${{ matrix.arch }}
          path: artifacts/pi-sea-verdict/verdict.json
          if-no-files-found: error

  aggregate-verdict:
    name: Aggregate PI SEA verdict
    needs:
      - platform-verdict
    if: always() && inputs.phase5_credential_probe != true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js 24.18.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Download platform verdicts
        if: always()
        uses: actions/download-artifact@v4
        with:
          pattern: pi-sea-verdict-*
          path: artifacts/pi-sea-platform-verdicts

      - name: Aggregate fail-closed verdict
        if: always()
        run: node scripts/check-pi-management-sea.mjs aggregate --dir artifacts/pi-sea-platform-verdicts --out artifacts/pi-sea-aggregate/verdict.json

      - name: Upload aggregate verdict
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pi-sea-aggregate-verdict
          path: artifacts/pi-sea-aggregate/verdict.json
          if-no-files-found: error

  phase5-credential-store-prototype:
    name: Phase 5 Windows Credential Manager prototype
    if: inputs.phase5_credential_probe == true && inputs.phase5_credential_platform == 'windows'
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out prototype branch
        uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Probe current-user Credential Manager
        shell: pwsh
        run: ./apps/daemon-next/prototypes/system-credential-store/run-windows.ps1

      - name: Probe standard-user Credential Manager isolation
        shell: pwsh
        run: ./apps/daemon-next/prototypes/system-credential-store/run-windows-standard-user.ps1

  phase5-linux-secret-service-prototype:
    name: Phase 5 Linux Secret Service prototype
    if: inputs.phase5_credential_probe == true && inputs.phase5_credential_platform == 'linux'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out prototype branch
        uses: actions/checkout@v6

      - name: Install Secret Service probe dependencies
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev gnome-keyring dbus-x11

      - name: Probe current-user Secret Service
        run: timeout 180s ./apps/daemon-next/prototypes/system-credential-store/run-linux.sh
