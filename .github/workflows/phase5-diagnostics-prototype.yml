name: Phase 5 diagnostics prototype

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase5-diagnostics-prototype-\${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnostics-probe:
    name: Diagnostics \${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform: macos-arm64
          - runner: ubuntu-24.04
            platform: linux-x64
          - runner: windows-2025
            platform: windows-x64
    runs-on: \${{ matrix.runner }}
    timeout-minutes: 10

    steps:
      - name: Check out prototype branch
        uses: actions/checkout@v6

      - name: Set up Node.js 24.18.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Run diagnostics redaction probe
        run: npm run prototype:phase5-diagnostics

      - name: Upload non-secret evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5-diagnostics-\${{ matrix.platform }}
          path: phase5-diagnostics-evidence/evidence.json
          if-no-files-found: error
