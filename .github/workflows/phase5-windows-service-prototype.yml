name: Phase 5 Windows user service prototype

on:
  push:
    branches:
      - codex/phase5-windows-service-prototype
    paths:
      - apps/daemon-next/prototypes/windows-user-service/**
      - package.json
      - .github/workflows/phase5-windows-service-prototype.yml

permissions:
  contents: read

jobs:
  hosted-runner-partial:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Validate persistent-session probe syntax
        shell: pwsh
        run: |
          @(
            'apps/daemon-next/prototypes/windows-user-service/run-session.ps1'
            'apps/daemon-next/prototypes/windows-user-service/run-hosted-standard-user.ps1'
          ) | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $_),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) { throw ($errors | Out-String) }
          }
      - name: Run MSI, Task Scheduler and drain probe
        shell: pwsh
        env:
          AGENTBEAN_WINDOWS_PROTOTYPE_EVIDENCE_DIR: ${{ github.workspace }}\phase5-windows-service-evidence
        run: |
          npm run prototype:phase5-windows-service 2>&1 | Tee-Object -FilePath phase5-windows-service-verdict.txt
          if ($LASTEXITCODE -ne 0) { throw "prototype failed with exit code $LASTEXITCODE" }
      - name: Upload partial hosted-runner evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5-windows-service-hosted-runner-verdict
          path: |
            phase5-windows-service-verdict.txt
            phase5-windows-service-evidence/**
          if-no-files-found: error

  hosted-standard-user-process:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Run full probe as ephemeral non-admin user
        shell: pwsh
        run: apps/daemon-next/prototypes/windows-user-service/run-hosted-standard-user.ps1
      - name: Upload hosted standard-user evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5-windows-service-hosted-standard-user-evidence
          path: phase5-windows-standard-user-evidence/**
          if-no-files-found: warn
